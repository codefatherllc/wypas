name: Package & Release

on:
  repository_dispatch:
    types: [client-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

env:
  GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "value=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download naked binary from release
        shell: bash
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.value }}" \
            --repo codefatherllc/wypas \
            --pattern "wypas-windows.exe" \
            --dir dist/
          mv dist/wypas-windows.exe dist/wypas.exe

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ steps.tag.outputs.value }} ^
            packaging\windows\setup.iss

      - name: Upload installer to release
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.value }}" \
            output/wypas-setup.exe \
            --repo codefatherllc/wypas \
            --clobber

  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "value=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download naked binary from release
        id: download
        run: |
          mkdir -p binaries
          if gh release download "${{ steps.tag.outputs.value }}" \
            --repo codefatherllc/wypas \
            --pattern "wypas-linux" \
            --dir binaries/ 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::wypas-linux binary not found on release, skipping Linux packaging"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install appimagetool
        if: steps.download.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          curl -fsSL -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Package AppImage
        if: steps.download.outputs.found == 'true'
        run: |
          chmod +x packaging/linux/package.sh
          ./packaging/linux/package.sh \
            binaries/wypas-linux \
            "${{ steps.tag.outputs.value }}" \
            output

      - name: Upload to release
        if: steps.download.outputs.found == 'true'
        run: |
          gh release upload "${{ steps.tag.outputs.value }}" \
            output/wypas-linux.AppImage \
            --repo codefatherllc/wypas \
            --clobber

  macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "value=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download naked binary from release
        run: |
          mkdir -p binaries
          gh release download "${{ steps.tag.outputs.value }}" \
            --repo codefatherllc/wypas \
            --pattern "wypas-macos" \
            --dir binaries/

      - name: Install dependencies
        run: |
          brew install dylibbundler luajit physfs libzip openssl@3 \
            glfw openal-soft libogg libvorbis boost zlib bzip2

      - name: Package DMG
        run: |
          chmod +x packaging/macos/package-dmg.sh
          ./packaging/macos/package-dmg.sh \
            binaries/wypas-macos \
            "${{ steps.tag.outputs.value }}" \
            output

      - name: Upload to release
        run: |
          gh release upload "${{ steps.tag.outputs.value }}" \
            output/wypas-setup.dmg \
            --repo codefatherllc/wypas \
            --clobber
